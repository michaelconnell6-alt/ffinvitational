<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ForeFathers Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
  :root { --green:#1a3a2a; --gold:#c9a84c; --cream:#f5f0e8; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--green); font-family:'Oswald',sans-serif; color:var(--cream); min-height:100vh; }

  #login-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; gap:16px; padding:20px; }
  #login-screen h1 { font-family:'Playfair Display',serif; color:var(--gold); font-size:2rem; text-align:center; }
  #login-screen p { color:rgba(245,240,232,0.6); font-size:12px; letter-spacing:2px; text-transform:uppercase; }
  .input-group { display:flex; flex-direction:column; gap:6px; width:100%; max-width:320px; }
  .input-group label { font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--gold); }
  .input-group input { background:rgba(255,255,255,0.08); border:1px solid rgba(201,168,76,0.3); color:var(--cream); padding:12px 14px; font-family:'Oswald',sans-serif; font-size:14px; outline:none; width:100%; }
  .input-group input:focus { border-color:var(--gold); }
  .btn { background:var(--gold); color:var(--green); border:none; padding:13px 32px; font-family:'Oswald',sans-serif; font-size:13px; letter-spacing:2px; text-transform:uppercase; cursor:pointer; font-weight:500; width:100%; max-width:320px; transition:background 0.2s; }
  .btn:hover { background:#e5c97a; }
  .btn.secondary { background:transparent; color:var(--gold); border:1px solid rgba(201,168,76,0.4); }
  .btn.secondary:hover { background:rgba(201,168,76,0.1); }
  #login-error { color:#e74c3c; font-size:12px; letter-spacing:1px; display:none; }

  #admin-panel { display:none; padding:0 0 60px; }
  .admin-header { background:rgba(0,0,0,0.3); border-bottom:2px solid var(--gold); padding:16px 24px; display:flex; justify-content:space-between; align-items:center; }
  .admin-header h1 { font-family:'Playfair Display',serif; color:var(--gold); font-size:1.3rem; }
  .admin-header button { background:none; border:1px solid rgba(201,168,76,0.3); color:var(--cream); padding:6px 16px; cursor:pointer; font-family:'Oswald',sans-serif; font-size:11px; letter-spacing:1px; }
  .admin-body { max-width:900px; margin:0 auto; padding:30px 20px; }
  .section-label { font-size:10px; letter-spacing:3px; text-transform:uppercase; color:var(--gold); margin-bottom:16px; margin-top:32px; border-bottom:1px solid rgba(201,168,76,0.2); padding-bottom:8px; }

  .score-table { width:100%; border-collapse:collapse; }
  .score-table th { background:rgba(0,0,0,0.3); color:var(--gold); font-size:11px; letter-spacing:2px; text-transform:uppercase; padding:12px 10px; text-align:left; }
  .score-table th:not(:first-child) { text-align:center; }
  .score-table td { padding:8px 6px; border-bottom:1px solid rgba(255,255,255,0.05); }
  .score-table td:first-child { font-size:13px; letter-spacing:0.5px; }
  .score-table td .hcp { font-size:10px; color:rgba(245,240,232,0.4); }
  .score-table input[type="number"] { width:60px; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.1); color:var(--cream); padding:8px 6px; text-align:center; font-family:'Oswald',sans-serif; font-size:14px; -moz-appearance:textfield; }
  .score-table input[type="number"]::-webkit-inner-spin-button { -webkit-appearance:none; }
  .score-table input[type="number"]:focus { border-color:var(--gold); outline:none; }
  .score-table .net-cell { font-size:12px; color:var(--gold); text-align:center; }
  .score-table .total-cell { font-weight:500; font-size:14px; text-align:center; }
  .score-table tr:hover td { background:rgba(255,255,255,0.03); }

  .save-bar { position:fixed; bottom:0; left:0; right:0; background:var(--green); border-top:2px solid var(--gold); padding:14px 24px; display:flex; gap:12px; align-items:center; justify-content:flex-end; }
  #save-status { font-size:12px; letter-spacing:1px; flex:1; }
  #save-status.ok { color:#2ecc71; }
  #save-status.err { color:#e74c3c; }
  #save-status.saving { color:var(--gold); }
  .table-wrapper { overflow-x:auto; }

  .round-tabs { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:16px; }
  .round-tab { background:transparent; border:1px solid rgba(201,168,76,0.3); color:rgba(245,240,232,0.6); padding:7px 14px; font-family:'Oswald',sans-serif; font-size:11px; letter-spacing:1px; text-transform:uppercase; cursor:pointer; transition:all 0.2s; }
  .round-tab.active { background:var(--gold); color:var(--green); border-color:var(--gold); }
  .round-tab:hover:not(.active) { border-color:var(--gold); color:var(--cream); }
  #pairings-status.ok { color:#2ecc71; }
  #pairings-status.err { color:#e74c3c; }
  #pairings-status.saving { color:var(--gold); }

  @media (max-width:600px) {
    .score-table input[type="number"] { width:48px; font-size:13px; }
    .score-table th, .score-table td { padding:8px 4px; }
  }
</style>
</head>
<body>

<div id="login-screen">
  <h1>ForeFathers Admin</h1>
  <p>Tournament Scoring Panel</p>
  <div class="input-group">
    <label>Password</label>
    <input type="password" id="password-input" placeholder="Enter password" onkeydown="if(event.key==='Enter')login()"/>
  </div>
  <button class="btn" onclick="login()">Enter</button>
  <div id="login-error">Incorrect password</div>
</div>

<div id="admin-panel">
  <div class="admin-header">
    <h1>ForeFathers Invitational — Scoring</h1>
    <button onclick="logout()">Log Out</button>
  </div>
  <div class="admin-body">

    <div class="section-label">Tee Time Pairings</div>
    <div id="pairings-panel">
      <div class="round-tabs">
        <button class="round-tab active" onclick="switchRound(0)">R1 · True Blue</button>
        <button class="round-tab" onclick="switchRound(1)">R2 · Caledonia</button>
        <button class="round-tab" onclick="switchRound(2)">R3 · Pawleys</button>
        <button class="round-tab" onclick="switchRound(3)">R4 · TPC</button>
      </div>
      <div id="pairings-builder"></div>
      <div style="display:flex;gap:10px;margin-top:14px;flex-wrap:wrap;">
        <button class="btn secondary" style="width:auto;max-width:none;" onclick="loadPairings()">Refresh Pairings</button>
        <button class="btn" style="width:auto;max-width:none;" onclick="savePairings()">Save Pairings to Site</button>
      </div>
      <div id="pairings-status" style="font-size:12px;letter-spacing:1px;margin-top:8px;"></div>
    </div>

    <div class="section-label" style="margin-top:40px;">Round Scores (Gross)</div>
    <div class="table-wrapper">
      <table class="score-table" id="score-table">
        <thead>
          <tr>
            <th>Player</th>
            <th>R1<br><small style="opacity:0.5;font-size:9px">True Blue</small></th>
            <th>R2<br><small style="opacity:0.5;font-size:9px">Caledonia</small></th>
            <th>R3<br><small style="opacity:0.5;font-size:9px">Pawleys</small></th>
            <th>R4<br><small style="opacity:0.5;font-size:9px">TPC</small></th>
            <th>Gross</th>
            <th>Net</th>
          </tr>
        </thead>
        <tbody id="score-body"></tbody>
      </table>
    </div>

  </div>
  <div class="save-bar">
    <div id="save-status"></div>
    <button class="btn secondary" style="width:auto;max-width:none;" onclick="loadScores()">Refresh</button>
    <button class="btn" style="width:auto;max-width:none;" onclick="saveScores()">Save Scores to Site</button>
  </div>
</div>

<script>
const ADMIN_PASSWORD = 'forefathers2026';
const REPO_OWNER    = 'michaelconnell6-alt';
const REPO_NAME     = 'ffinvitational';
const SCORES_FILE   = 'scores.json';
const PAIRINGS_FILE = 'pairings.json';

let scoresData   = null;
let fileSha      = null;
let pairingsSha  = null;
let activeRound  = 0;
let pairingsData = {
  rounds: [
    { round:1, course:'True Blue',         date:'Friday, July 11',   groups:[] },
    { round:2, course:'Caledonia',          date:'Friday, July 11',   groups:[] },
    { round:3, course:'Pawleys Plantation', date:'Saturday, July 12', groups:[] },
    { round:4, course:'TPC Myrtle Beach',   date:'Sunday, July 13',   groups:[] }
  ]
};

// ── AUTH ──────────────────────────────────────────────────────
function login() {
  if (document.getElementById('password-input').value === ADMIN_PASSWORD) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-panel').style.display  = 'block';
    loadScores();
    loadPairings();
  } else {
    document.getElementById('login-error').style.display = 'block';
  }
}
function logout() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('admin-panel').style.display  = 'none';
  document.getElementById('password-input').value = '';
}

// ── FALLBACK PLAYERS ──────────────────────────────────────────
const FALLBACK_PLAYERS = [
  {"name":"Rob Leverone",    "handicap":8.4,  "strokes":[10,12,11,12],"scores":[null,null,null,null]},
  {"name":"Mikey Connell",   "handicap":6.9,  "strokes":[8, 10, 9,10],"scores":[null,null,null,null]},
  {"name":"Joseph Lowry",    "handicap":9.3,  "strokes":[11,13,12,13],"scores":[null,null,null,null]},
  {"name":"Garrett Wardell", "handicap":11.7, "strokes":[14,16,15,16],"scores":[null,null,null,null]},
  {"name":"Russell Cobble",  "handicap":5.7,  "strokes":[7, 9, 7, 8], "scores":[null,null,null,null]},
  {"name":"Justin Roy",      "handicap":13.0, "strokes":[16,18,16,18],"scores":[null,null,null,null]},
  {"name":"Steve Williams",  "handicap":10.3, "strokes":[13,15,13,15],"scores":[null,null,null,null]},
  {"name":"Micah Smoak",     "handicap":6.6,  "strokes":[8, 10, 8,10],"scores":[null,null,null,null]},
  {"name":"Nick Demarchi",   "handicap":12.4, "strokes":[15,17,16,17],"scores":[null,null,null,null]},
  {"name":"John Beauregard", "handicap":5.8,  "strokes":[7, 9, 7, 8], "scores":[null,null,null,null]},
  {"name":"Derek Beauregard","handicap":10.2, "strokes":[13,14,13,14],"scores":[null,null,null,null]},
  {"name":"Ryan Beauregard", "handicap":6.3,  "strokes":[8, 9, 8, 9], "scores":[null,null,null,null]},
  {"name":"Nick Brabant",    "handicap":17.9, "strokes":[22,24,22,25],"scores":[null,null,null,null]},
  {"name":"Court Russo",     "handicap":12.9, "strokes":[12,14,12,15],"scores":[null,null,null,null]}
];

const ALL_PLAYERS = FALLBACK_PLAYERS.map(function(p){ return p.name; });

// ── SCORES ────────────────────────────────────────────────────
async function loadScores() {
  const token = localStorage.getItem('ff_token');
  setStatus('Loading scores...', 'saving');
  if (token) {
    try {
      const res = await fetch('https://api.github.com/repos/' + REPO_OWNER + '/' + REPO_NAME + '/contents/' + SCORES_FILE, {
        headers: { 'Authorization': 'token ' + token, 'Cache-Control': 'no-cache' }
      });
      if (res.ok) {
        const json = await res.json();
        fileSha    = json.sha;
        scoresData = JSON.parse(atob(json.content.replace(/\s/g, '')));
        setStatus('✓ Scores loaded from GitHub', 'ok');
        renderTable();
        return;
      }
    } catch(e) {}
  }
  try {
    const raw = await fetch('https://raw.githubusercontent.com/' + REPO_OWNER + '/' + REPO_NAME + '/main/' + SCORES_FILE + '?_=' + Date.now());
    if (raw.ok) {
      scoresData = await raw.json();
      fileSha    = null;
      setStatus('✓ Scores loaded (SHA will be fetched on save)', 'ok');
      renderTable();
      return;
    }
  } catch(e) {}
  scoresData = { players: FALLBACK_PLAYERS };
  fileSha = null;
  setStatus('⚠ Using local data — save will fetch SHA automatically', 'err');
  renderTable();
}

function renderTable() {
  var tbody = document.getElementById('score-body');
  tbody.innerHTML = '';
  scoresData.players.forEach(function(p, pi) {
    var gross = p.scores.reduce(function(a,v){ return a + (v||0); }, 0);
    var rounds = p.scores.filter(function(v){ return v !== null; }).length;
    var strokesTotal = p.scores.reduce(function(a,v,i){ return v !== null ? a + (p.strokes[i]||0) : a; }, 0);
    var net = rounds > 0 ? gross - strokesTotal : null;
    var tr = document.createElement('tr');
    tr.innerHTML = '<td>' + p.name + '<br><span class="hcp">HCP ' + p.handicap + '</span></td>' +
      p.scores.map(function(s, ri) {
        return '<td style="text-align:center"><input type="number" value="' + (s||'') + '" placeholder="—" oninput="updateScore(' + pi + ',' + ri + ',this.value)"/></td>';
      }).join('') +
      '<td class="total-cell">' + (rounds > 0 ? gross : '—') + '</td>' +
      '<td class="net-cell">'   + (net !== null  ? net  : '—') + '</td>';
    tbody.appendChild(tr);
  });
}

function updateScore(pi, ri, val) {
  scoresData.players[pi].scores[ri] = val === '' ? null : parseInt(val);
  var p = scoresData.players[pi];
  var gross = p.scores.reduce(function(a,v){ return a+(v||0); }, 0);
  var rounds = p.scores.filter(function(v){ return v !== null; }).length;
  var strokesTotal = p.scores.reduce(function(a,v,i){ return v !== null ? a+(p.strokes[i]||0) : a; }, 0);
  var net = rounds > 0 ? gross - strokesTotal : null;
  var rows = document.getElementById('score-body').querySelectorAll('tr');
  rows[pi].querySelector('.total-cell').textContent = rounds > 0 ? gross : '—';
  rows[pi].querySelector('.net-cell').textContent   = net !== null ? net : '—';
}

async function saveScores() {
  var token = localStorage.getItem('ff_token');
  if (!token) { setStatus('No GitHub token — contact admin', 'err'); return; }
  setStatus('Saving...', 'saving');
  try {
    if (!fileSha) {
      var shaRes = await fetch('https://api.github.com/repos/' + REPO_OWNER + '/' + REPO_NAME + '/contents/' + SCORES_FILE, { headers: { 'Authorization': 'token ' + token } });
      if (shaRes.ok) { var shaJson = await shaRes.json(); fileSha = shaJson.sha; }
    }
    var content = btoa(unescape(encodeURIComponent(JSON.stringify(scoresData, null, 2))));
    var body    = { message: 'Update scores', content: content };
    if (fileSha) body.sha = fileSha;
    var res = await fetch('https://api.github.com/repos/' + REPO_OWNER + '/' + REPO_NAME + '/contents/' + SCORES_FILE, {
      method: 'PUT',
      headers: { 'Authorization': 'token ' + token, 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (res.ok) {
      var json = await res.json();
      fileSha = json.content.sha;
      setStatus('✓ Scores saved! Site updates in ~30s', 'ok');
    } else {
      var err = await res.json();
      setStatus('✗ Save failed: ' + (err.message || res.status), 'err');
    }
  } catch(e) { setStatus('✗ Error: ' + e.message, 'err'); }
}

function setStatus(msg, cls) {
  var el = document.getElementById('save-status');
  el.textContent = msg; el.className = cls;
}

// ── PAIRINGS ──────────────────────────────────────────────────
async function loadPairings() {
  var token = localStorage.getItem('ff_token');
  setPairStatus('Loading...', 'saving');

  if (token) {
    try {
      var res = await fetch('https://api.github.com/repos/' + REPO_OWNER + '/' + REPO_NAME + '/contents/' + PAIRINGS_FILE, {
        headers: { 'Authorization': 'token ' + token, 'Cache-Control': 'no-cache' }
      });
      if (res.ok) {
        var json    = await res.json();
        pairingsSha = json.sha;
        pairingsData = JSON.parse(atob(json.content.replace(/\s/g, '')));
        setPairStatus('✓ Pairings loaded (API)', 'ok');
        renderPairings();
        return;
      }
    } catch(e) { /* fall through */ }
  }

  try {
    var raw = await fetch('https://raw.githubusercontent.com/' + REPO_OWNER + '/' + REPO_NAME + '/main/' + PAIRINGS_FILE + '?_=' + Date.now());
    if (raw.ok) {
      pairingsData = await raw.json();
      pairingsSha  = null;
      setPairStatus('✓ Pairings loaded (raw)', 'ok');
    } else {
      pairingsData = { rounds: [
        { round:1, course:'True Blue',          date:'Friday, July 11',   groups:[] },
        { round:2, course:'Caledonia',           date:'Friday, July 11',   groups:[] },
        { round:3, course:'Pawleys Plantation',  date:'Saturday, July 12', groups:[] },
        { round:4, course:'TPC Myrtle Beach',    date:'Sunday, July 13',   groups:[] }
      ]};
      setPairStatus('Using blank pairings', 'err');
    }
    renderPairings();
  } catch(e) {
    setPairStatus('Could not load pairings: ' + e.message, 'err');
  }
}

function switchRound(idx) {
  activeRound = idx;
  document.querySelectorAll('.round-tab').forEach(function(t, i){ t.classList.toggle('active', i === idx); });
  renderPairings();
}

function renderPairings() {
  var builder = document.getElementById('pairings-builder');
  if (!builder || !pairingsData) return;

  var round    = pairingsData.rounds[activeRound];
  var assigned = [];
  for (var gi = 0; gi < round.groups.length; gi++) {
    for (var pi = 0; pi < round.groups[gi].players.length; pi++) {
      assigned.push(round.groups[gi].players[pi]);
    }
  }
  var unassigned = ALL_PLAYERS.filter(function(p){ return assigned.indexOf(p) === -1; });

  var html = '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:8px;">';
  for (var g = 0; g < round.groups.length; g++) {
    var grp = round.groups[g];
    html += '<div style="background:rgba(0,0,0,0.25);border:1px solid rgba(201,168,76,0.2);padding:14px;">';
    html += '<div style="font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#c9a84c;margin-bottom:8px;">Group ' + (g+1) + '</div>';
    html += '<input value="' + (grp.teeTime||'') + '" placeholder="Tee time (e.g. 8:06 AM)" oninput="pairingsData.rounds[' + activeRound + '].groups[' + g + '].teeTime=this.value" style="width:100%;background:rgba(255,255,255,0.08);border:1px solid rgba(201,168,76,0.3);color:#f5f0e8;padding:7px 10px;font-size:13px;margin-bottom:8px;outline:none;"/>';
    for (var pp = 0; pp < grp.players.length; pp++) {
      html += '<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.05);font-size:13px;color:#f5f0e8;">';
      html += '<span>' + grp.players[pp] + '</span>';
      html += '<button onclick="removeFromGroup(' + g + ',\'' + grp.players[pp] + '\')" style="background:none;border:none;color:rgba(201,168,76,0.5);cursor:pointer;font-size:18px;line-height:1;padding:0 2px;">×</button>';
      html += '</div>';
    }
    if (unassigned.length > 0) {
      html += '<select onchange="addToGroup(' + g + ',this)" style="margin-top:8px;width:100%;background:#1a3a2a;border:1px solid rgba(201,168,76,0.3);color:#f5f0e8;padding:6px;font-size:12px;">';
      html += '<option value="">+ Add player</option>';
      for (var u = 0; u < unassigned.length; u++) {
        html += '<option value="' + unassigned[u] + '">' + unassigned[u] + '</option>';
      }
      html += '</select>';
    }
    html += '</div>';
  }
  html += '</div>';

  if (round.groups.length < 5) {
    html += '<button onclick="addGroup()" style="background:transparent;border:1px dashed rgba(201,168,76,0.4);color:#c9a84c;padding:10px;width:100%;cursor:pointer;font-size:12px;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;">+ Add Group</button>';
  }

  if (unassigned.length > 0) {
    html += '<div style="margin-top:12px;">';
    html += '<div style="font-size:10px;letter-spacing:2px;color:rgba(245,240,232,0.5);text-transform:uppercase;margin-bottom:8px;">Unassigned Players</div>';
    html += '<div style="display:flex;flex-wrap:wrap;gap:6px;">';
    for (var uu = 0; uu < unassigned.length; uu++) {
      html += '<span onclick="promptAddToGroup(\'' + unassigned[uu] + '\')" style="background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);color:#f5f0e8;padding:5px 12px;font-size:12px;cursor:pointer;letter-spacing:0.5px;">' + unassigned[uu] + '</span>';
    }
    html += '</div></div>';
  }

  builder.innerHTML = html;
}

function addGroup() {
  pairingsData.rounds[activeRound].groups.push({ teeTime:'', players:[] });
  renderPairings();
}
function addToGroup(gi, sel) {
  if (!sel.value) return;
  pairingsData.rounds[activeRound].groups[gi].players.push(sel.value);
  renderPairings();
}
function removeFromGroup(gi, player) {
  var g = pairingsData.rounds[activeRound].groups[gi];
  g.players = g.players.filter(function(p){ return p !== player; });
  renderPairings();
}
function promptAddToGroup(player) {
  var round = pairingsData.rounds[activeRound];
  if (round.groups.length === 0) { alert('Add a group first.'); return; }
  if (round.groups.length === 1) { pairingsData.rounds[activeRound].groups[0].players.push(player); renderPairings(); return; }
  var choice = prompt('Add ' + player + ' to which group?\n' + round.groups.map(function(g,i){ return (i+1) + ': ' + (g.teeTime||'Group '+(i+1)); }).join('\n') + '\nEnter group number:');
  var idx = parseInt(choice) - 1;
  if (!isNaN(idx) && idx >= 0 && idx < round.groups.length) {
    pairingsData.rounds[activeRound].groups[idx].players.push(player);
    renderPairings();
  }
}

async function savePairings() {
  var token = localStorage.getItem('ff_token');
  if (!token) { setPairStatus('No GitHub token', 'err'); return; }
  setPairStatus('Saving...', 'saving');
  try {
    if (!pairingsSha) {
      var shaRes = await fetch('https://api.github.com/repos/' + REPO_OWNER + '/' + REPO_NAME + '/contents/' + PAIRINGS_FILE, { headers: { 'Authorization': 'token ' + token } });
      if (shaRes.ok) { var sj = await shaRes.json(); pairingsSha = sj.sha; }
    }
    var content = btoa(unescape(encodeURIComponent(JSON.stringify(pairingsData, null, 2))));
    var body    = { message: 'Update pairings', content: content };
    if (pairingsSha) body.sha = pairingsSha;
    var res = await fetch('https://api.github.com/repos/' + REPO_OWNER + '/' + REPO_NAME + '/contents/' + PAIRINGS_FILE, {
      method: 'PUT',
      headers: { 'Authorization': 'token ' + token, 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (res.ok) {
      var j = await res.json();
      pairingsSha = j.content.sha;
      setPairStatus('✓ Pairings saved! Site updates in ~30s', 'ok');
    } else {
      var err = await res.json();
      setPairStatus('✗ Save failed: ' + (err.message || res.status), 'err');
    }
  } catch(e) { setPairStatus('✗ Error: ' + e.message, 'err'); }
}

function setPairStatus(msg, cls) {
  var el = document.getElementById('pairings-status');
  el.textContent = msg; el.className = cls;
}
</script>
</body>
