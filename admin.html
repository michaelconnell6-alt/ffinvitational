<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ForeFathers Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #1a3a2a;
    --gold: #c9a84c;
    --cream: #f5f0e8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--green); font-family: 'Oswald', sans-serif; color: var(--cream); min-height: 100vh; }

  /* LOGIN */
  #login-screen {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh; gap: 16px; padding: 20px;
  }
  #login-screen h1 { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 2rem; text-align: center; }
  #login-screen p { color: rgba(245,240,232,0.6); font-size: 12px; letter-spacing: 2px; text-transform: uppercase; }
  .input-group { display: flex; flex-direction: column; gap: 6px; width: 100%; max-width: 320px; }
  .input-group label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); }
  .input-group input {
    background: rgba(255,255,255,0.08); border: 1px solid rgba(201,168,76,0.3);
    color: var(--cream); padding: 12px 14px; font-family: 'Oswald', sans-serif;
    font-size: 14px; outline: none; width: 100%;
  }
  .input-group input:focus { border-color: var(--gold); }
  .btn {
    background: var(--gold); color: var(--green); border: none; padding: 13px 32px;
    font-family: 'Oswald', sans-serif; font-size: 13px; letter-spacing: 2px;
    text-transform: uppercase; cursor: pointer; font-weight: 500; width: 100%; max-width: 320px;
    transition: background 0.2s;
  }
  .btn:hover { background: #e5c97a; }
  .btn.secondary {
    background: transparent; color: var(--gold); border: 1px solid rgba(201,168,76,0.4);
  }
  .btn.secondary:hover { background: rgba(201,168,76,0.1); }
  #login-error { color: #e74c3c; font-size: 12px; letter-spacing: 1px; display: none; }

  /* ADMIN PANEL */
  #admin-panel { display: none; padding: 0 0 60px; }

  .admin-header {
    background: rgba(0,0,0,0.3); border-bottom: 2px solid var(--gold);
    padding: 16px 24px; display: flex; justify-content: space-between; align-items: center;
  }
  .admin-header h1 { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 1.3rem; }
  .admin-header button { background: none; border: 1px solid rgba(201,168,76,0.3); color: var(--cream); padding: 6px 16px; cursor: pointer; font-family: 'Oswald', sans-serif; font-size: 11px; letter-spacing: 1px; }

  .admin-body { max-width: 900px; margin: 0 auto; padding: 30px 20px; }

  .section-label {
    font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--gold); margin-bottom: 16px; margin-top: 32px;
    border-bottom: 1px solid rgba(201,168,76,0.2); padding-bottom: 8px;
  }

  /* TOKEN SETUP */
  #token-setup { background: rgba(0,0,0,0.2); padding: 20px; margin-bottom: 8px; }
  #token-setup p { font-size: 12px; color: rgba(245,240,232,0.6); margin-bottom: 12px; line-height: 1.6; }
  .token-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .token-row input {
    flex: 1; min-width: 200px; background: rgba(255,255,255,0.08);
    border: 1px solid rgba(201,168,76,0.3); color: var(--cream);
    padding: 10px 12px; font-family: 'Oswald', sans-serif; font-size: 13px;
  }
  #token-status { font-size: 11px; letter-spacing: 1px; margin-top: 8px; }
  #token-status.ok { color: #2ecc71; }
  #token-status.err { color: #e74c3c; }

  /* SCORE TABLE */
  .score-table { width: 100%; border-collapse: collapse; }
  .score-table th {
    background: rgba(0,0,0,0.3); color: var(--gold);
    font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
    padding: 12px 10px; text-align: left;
  }
  .score-table th:not(:first-child) { text-align: center; }
  .score-table td { padding: 8px 6px; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .score-table td:first-child { font-size: 13px; letter-spacing: 0.5px; }
  .score-table td .hcp { font-size: 10px; color: rgba(245,240,232,0.4); }
  .score-table input[type="number"] {
    width: 60px; background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.1); color: var(--cream);
    padding: 8px 6px; text-align: center; font-family: 'Oswald', sans-serif;
    font-size: 14px; -moz-appearance: textfield;
  }
  .score-table input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
  .score-table input[type="number"]:focus { border-color: var(--gold); outline: none; }
  .score-table .net-cell { font-size: 12px; color: var(--gold); text-align: center; }
  .score-table .total-cell { font-weight: 500; font-size: 14px; text-align: center; }
  .score-table tr:hover td { background: rgba(255,255,255,0.03); }

  /* SAVE BAR */
  .save-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--green); border-top: 2px solid var(--gold);
    padding: 14px 24px; display: flex; gap: 12px; align-items: center; justify-content: flex-end;
  }
  #save-status { font-size: 12px; letter-spacing: 1px; flex: 1; }
  #save-status.ok { color: #2ecc71; }
  #save-status.err { color: #e74c3c; }
  #save-status.saving { color: var(--gold); }

  .table-wrapper { overflow-x: auto; }

  /* PAIRINGS */
  .round-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
  .round-tab {
    background: transparent; border: 1px solid rgba(201,168,76,0.3);
    color: rgba(245,240,232,0.6); padding: 7px 14px;
    font-family: 'Oswald', sans-serif; font-size: 11px; letter-spacing: 1px;
    text-transform: uppercase; cursor: pointer; transition: all 0.2s;
  }
  .round-tab.active { background: var(--gold); color: var(--green); border-color: var(--gold); }
  .round-tab:hover:not(.active) { border-color: var(--gold); color: var(--cream); }

  .groups-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; }
  .group-card {
    background: rgba(0,0,0,0.2); border: 1px solid rgba(201,168,76,0.15); padding: 14px;
  }
  .group-card-header {
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--gold); margin-bottom: 10px;
  }
  .group-tee-input {
    width: 100%; background: rgba(255,255,255,0.08);
    border: 1px solid rgba(201,168,76,0.3); color: var(--cream);
    padding: 7px 10px; font-family: 'Oswald', sans-serif; font-size: 13px;
    margin-bottom: 10px;
  }
  .player-pool-label { font-size: 10px; letter-spacing: 2px; color: rgba(245,240,232,0.5); text-transform: uppercase; margin-bottom: 8px; }
  .group-players { min-height: 60px; }
  .group-player-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px;
  }
  .remove-player { background: none; border: none; color: rgba(201,168,76,0.5); cursor: pointer; font-size: 16px; padding: 0 4px; }
  .remove-player:hover { color: #e74c3c; }
  .player-pool { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 16px; }
  .pool-player {
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
    color: var(--cream); padding: 5px 12px; font-family: 'Oswald', sans-serif;
    font-size: 12px; cursor: pointer; transition: all 0.15s;
  }
  .pool-player:hover { background: var(--gold); color: var(--green); border-color: var(--gold); }
  .add-group-btn {
    background: transparent; border: 1px dashed rgba(201,168,76,0.3);
    color: rgba(201,168,76,0.6); padding: 10px; width: 100%; cursor: pointer;
    font-family: 'Oswald', sans-serif; font-size: 11px; letter-spacing: 2px;
    text-transform: uppercase; margin-top: 4px; transition: all 0.2s;
  }
  .add-group-btn:hover { border-color: var(--gold); color: var(--gold); }

  #pairings-status.ok { color: #2ecc71; }
  #pairings-status.err { color: #e74c3c; }
  #pairings-status.saving { color: var(--gold); }

  @media (max-width: 600px) {
    .score-table input[type="number"] { width: 48px; font-size: 13px; }
    .score-table th, .score-table td { padding: 8px 4px; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <h1>ForeFathers Admin</h1>
  <p>Tournament Scoring Panel</p>
  <div class="input-group">
    <label>Password</label>
    <input type="password" id="password-input" placeholder="Enter password" onkeydown="if(event.key==='Enter')login()"/>
  </div>
  <button class="btn" onclick="login()">Enter</button>
  <div id="login-error">Incorrect password</div>
</div>

<!-- ADMIN PANEL -->
<div id="admin-panel">
  <div class="admin-header">
    <h1>ForeFathers Invitational — Scoring</h1>
    <button onclick="logout()">Log Out</button>
  </div>

  <div class="admin-body">

    <!-- PAIRINGS -->
    <div class="section-label">Tee Time Pairings</div>
    <div id="pairings-panel">
      <div class="round-tabs">
        <button class="round-tab active" onclick="switchRound(0)">R1 · True Blue</button>
        <button class="round-tab" onclick="switchRound(1)">R2 · Caledonia</button>
        <button class="round-tab" onclick="switchRound(2)">R3 · Pawleys</button>
        <button class="round-tab" onclick="switchRound(3)">R4 · TPC</button>
      </div>
      <div id="pairings-builder"></div>
      <div style="display:flex;gap:10px;margin-top:14px;flex-wrap:wrap;">
        <button class="btn secondary" style="width:auto;max-width:none;" onclick="loadPairings()">Refresh Pairings</button>
        <button class="btn" style="width:auto;max-width:none;" onclick="savePairings()">Save Pairings to Site</button>
      </div>
      <div id="pairings-status" style="font-size:12px;letter-spacing:1px;margin-top:8px;"></div>
    </div>

    <!-- SCORE ENTRY -->
    <div class="section-label" style="margin-top:40px;">Round Scores (Gross)</div>
    <div class="table-wrapper">
      <table class="score-table" id="score-table">
        <thead>
          <tr>
            <th>Player</th>
            <th>R1<br><small style="opacity:0.5;font-size:9px">True Blue</small></th>
            <th>R2<br><small style="opacity:0.5;font-size:9px">Caledonia</small></th>
            <th>R3<br><small style="opacity:0.5;font-size:9px">Pawleys</small></th>
            <th>R4<br><small style="opacity:0.5;font-size:9px">TPC</small></th>
            <th>Gross</th>
            <th>Net</th>
          </tr>
        </thead>
        <tbody id="score-body"></tbody>
      </table>
    </div>

  </div>

  <div class="save-bar">
    <div id="save-status"></div>
    <button class="btn secondary" style="width:auto;max-width:none;" onclick="loadScores()">Refresh</button>
    <button class="btn" style="width:auto;max-width:none;" onclick="saveScores()">Save Scores to Site</button>
  </div>
</div>

<script>
const ADMIN_PASSWORD = 'forefathers2026';
const REPO_OWNER = 'michaelconnell6-alt';
const REPO_NAME = 'ffinvitational';
const SCORES_FILE = 'scores.json';


let scoresData = null;
let fileSha = null;

// ── AUTH ──────────────────────────────────────────────────────
function login() {
  const pw = document.getElementById('password-input').value;
  if (pw === ADMIN_PASSWORD) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-panel').style.display = 'block';
    loadTokenUI();
    loadScores();
    loadPairings();
  } else {
    document.getElementById('login-error').style.display = 'block';
  }
}

function logout() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('admin-panel').style.display = 'none';
  document.getElementById('password-input').value = '';
}

// ── IMAGE UPLOAD ──────────────────────────────────────────────
async function uploadImage() {
  const status = document.getElementById('img-upload-status');
  const fileInput = document.getElementById('img-file-input');
  const filenameInput = document.getElementById('img-filename');
  const token = localStorage.getItem('ff_token');

  if (!token) { status.textContent = '✗ No GitHub token saved — add it in the Token section below'; status.style.color = '#e74c3c'; return; }
  if (!fileInput.files.length) { status.textContent = '✗ Please select an image file'; status.style.color = '#e74c3c'; return; }

  const file = fileInput.files[0];
  const filename = filenameInput.value.trim() || file.name;
  const path = `images/${filename}`;

  status.textContent = 'Reading file...'; status.style.color = 'var(--gold)';

  const reader = new FileReader();
  reader.onload = async function(e) {
    const base64 = e.target.result.split(',')[1];
    status.textContent = 'Uploading...'; status.style.color = 'var(--gold)';
    try {
      // Check if file already exists (need SHA to overwrite)
      let sha = null;
      const check = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${path}`, {
        headers: { 'Authorization': `token ${token}` }
      });
      if (check.ok) { const existing = await check.json(); sha = existing.sha; }

      const body = { message: `Upload ${filename}`, content: base64 };
      if (sha) body.sha = sha;

      const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${path}`, {
        method: 'PUT',
        headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (res.ok) {
        status.textContent = `✓ ${filename} uploaded successfully`;
        status.style.color = '#2ecc71';
      } else {
        const err = await res.json();
        status.textContent = `✗ ${err.message || 'Upload failed'}`;
        status.style.color = '#e74c3c';
      }
    } catch(err) {
      status.textContent = '✗ Network error';
      status.style.color = '#e74c3c';
    }
  };
  reader.readAsDataURL(file);
}

// ── TOKEN ─────────────────────────────────────────────────────
function loadTokenUI() {
  const token = localStorage.getItem('ff_token');
  if (token) {
    document.getElementById('token-input').value = token;
    document.getElementById('token-status').textContent = '✓ Token saved';
    document.getElementById('token-status').className = 'ok';
  }
}

function saveToken() {
  const token = document.getElementById('token-input').value.trim();
  localStorage.setItem('ff_token', token);
  document.getElementById('token-status').textContent = '✓ Token saved locally';
  document.getElementById('token-status').className = 'ok';
}

async function testToken() {
  const token = document.getElementById('token-input').value.trim();
  const status = document.getElementById('token-status');
  status.textContent = 'Testing...'; status.className = '';
  try {
    const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}`, {
      headers: { 'Authorization': `token ${token}` }
    });
    if (res.ok) {
      status.textContent = '✓ Connected to repo successfully';
      status.className = 'ok';
    } else {
      status.textContent = '✗ Could not connect — check token and repo name';
      status.className = 'err';
    }
  } catch(e) {
    status.textContent = '✗ Connection error';
    status.className = 'err';
  }
}

// ── FALLBACK DATA ─────────────────────────────────────────────
const FALLBACK_PLAYERS = [
  {"name":"Rob Leverone",    "handicap":8.4,  "strokes":[10,12,11,12],"scores":[null,null,null,null]},
  {"name":"Mikey Connell",   "handicap":6.9,  "strokes":[8, 10, 9,10],"scores":[null,null,null,null]},
  {"name":"Joseph Lowry",    "handicap":9.3,  "strokes":[11,13,12,13],"scores":[null,null,null,null]},
  {"name":"Garrett Wardell", "handicap":11.7, "strokes":[14,16,15,16],"scores":[null,null,null,null]},
  {"name":"Russell Cobble",  "handicap":5.7,  "strokes":[7, 9, 7, 8], "scores":[null,null,null,null]},
  {"name":"Justin Roy",      "handicap":13.0, "strokes":[16,18,16,18],"scores":[null,null,null,null]},
  {"name":"Steve Williams",  "handicap":10.3, "strokes":[13,15,13,15],"scores":[null,null,null,null]},
  {"name":"Micah Smoak",     "handicap":6.6,  "strokes":[8, 10, 8,10],"scores":[null,null,null,null]},
  {"name":"Nick Demarchi",   "handicap":12.4, "strokes":[15,17,16,17],"scores":[null,null,null,null]},
  {"name":"John Beauregard", "handicap":5.8,  "strokes":[7, 9, 7, 8], "scores":[null,null,null,null]},
  {"name":"Derek Beauregard","handicap":10.2, "strokes":[13,14,13,14],"scores":[null,null,null,null]},
  {"name":"Ryan Beauregard", "handicap":6.3,  "strokes":[8, 9, 8, 9], "scores":[null,null,null,null]},
  {"name":"Nick Brabant",    "handicap":17.9, "strokes":[22,24,22,25],"scores":[null,null,null,null]},
  {"name":"Court Russo",     "handicap":12.9, "strokes":[12,14,12,15],"scores":[null,null,null,null]}
];

// ── LOAD SCORES ───────────────────────────────────────────────
async function loadScores() {
  const token = localStorage.getItem('ff_token');
  setStatus('Loading scores...', 'saving');

  // Try GitHub API first (gives us SHA for saves)
  if (token) {
    try {
      const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${SCORES_FILE}`, {
        headers: { 'Authorization': `token ${token}`, 'Cache-Control': 'no-cache' }
      });
      if (res.ok) {
        const json = await res.json();
        fileSha = json.sha;
        scoresData = JSON.parse(atob(json.content.replace(/\s/g,'')));
        setStatus('✓ Scores loaded from GitHub', 'ok');
        renderTable();
        return;
      }
    } catch(e) { /* fall through */ }
  }

  // Fallback: public raw URL (no token needed, SHA fetched at save time)
  try {
    const rawRes = await fetch(
      `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/main/${SCORES_FILE}?_=${Date.now()}`
    );
    if (rawRes.ok) {
      scoresData = await rawRes.json();
      fileSha = null;
      setStatus(token ? '✓ Scores loaded (SHA will be fetched on save)' : '✓ Scores loaded — enter token above to enable saving', 'ok');
      renderTable();
      return;
    }
  } catch(e) { /* fall through */ }

  // Final fallback: hardcoded blank data
  setStatus('⚠ Could not load from GitHub — enter token and click Refresh', 'err');
  scoresData = { players: FALLBACK_PLAYERS };
  fileSha = null;
  renderTable();
}

// ── RENDER TABLE ──────────────────────────────────────────────
function renderTable() {
  const tbody = document.getElementById('score-body');
  tbody.innerHTML = '';
  scoresData.players.forEach((p, pi) => {
    const gross = p.scores.reduce((a, v) => a + (v || 0), 0);
    const rounds = p.scores.filter(v => v !== null).length;
    const strokesTotal = p.scores.reduce((a, v, i) => v !== null ? a + (p.strokes[i] || 0) : a, 0);
    const net = rounds > 0 ? gross - strokesTotal : null;
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${p.name}<br><span class="hcp">HCP ${p.handicap}</span></td>
      ${p.scores.map((s, ri) => `
        <td style="text-align:center">
          <input type="number" value="${s || ''}"
            placeholder="—"
            oninput="updateScore(${pi}, ${ri}, this.value)"
          />
        </td>`).join('')}
      <td class="total-cell">${rounds > 0 ? gross : '—'}</td>
      <td class="net-cell">${net !== null ? net : '—'}</td>
    `;
    tbody.appendChild(tr);
  });
}

function updateScore(playerIdx, roundIdx, val) {
  scoresData.players[playerIdx].scores[roundIdx] = val === '' ? null : parseInt(val);
  // Update totals live
  const rows = document.getElementById('score-body').querySelectorAll('tr');
  const p = scoresData.players[playerIdx];
  const gross = p.scores.reduce((a, v) => a + (v || 0), 0);
  const rounds = p.scores.filter(v => v !== null).length;
  const strokesTotal = p.scores.reduce((a, v, i) => v !== null ? a + (p.strokes[i] || 0) : a, 0);
  const net = rounds > 0 ? gross - strokesTotal : null;
  rows[playerIdx].querySelector('.total-cell').textContent = rounds > 0 ? gross : '—';
  rows[playerIdx].querySelector('.net-cell').textContent = net !== null ? net : '—';
}

// ── SAVE SCORES ───────────────────────────────────────────────
async function saveScores() {
  const token = localStorage.getItem('ff_token');
  if (!token) { setStatus('No GitHub token saved — enter it above first', 'err'); return; }
  setStatus('Saving...', 'saving');
  try {
    // Always fetch fresh SHA before saving to avoid stale reference
    if (!fileSha) {
      const shaRes = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${SCORES_FILE}`, {
        headers: { 'Authorization': `token ${token}` }
      });
      if (shaRes.ok) {
        const shaJson = await shaRes.json();
        fileSha = shaJson.sha;
      }
    }
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(scoresData, null, 2))));
    const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${SCORES_FILE}`, {
      method: 'PUT',
      headers: {
        'Authorization': `token ${token}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(Object.assign(
        { message: 'Update scores', content: content },
        fileSha ? { sha: fileSha } : {}
      ))
    });
    if (res.ok) {
      const json = await res.json();
      fileSha = json.content.sha;
      setStatus('✓ Scores saved! Site will update in ~30 seconds', 'ok');
    } else {
      const err = await res.json();
      setStatus(`✗ Save failed (HTTP ${res.status}): ${err.message || 'unknown error'}`, 'err');
    }
  } catch(e) {
    setStatus('✗ Error: ' + e.message, 'err');
  }
}

function setStatus(msg, cls) {
  const el = document.getElementById('save-status');
  el.textContent = msg;
  el.className = cls;
}

// ── PAIRINGS ──────────────────────────────────────────────────
const PAIRINGS_FILE = 'pairings.json';
let pairingsData = null;
let pairingsSha = null;
let activeRound = 0;

const ALL_PLAYERS = [
  'Rob Leverone','Mikey Connell','Joseph Lowry','Garrett Wardell',
  'Russell Cobble','Justin Roy','Steve Williams','Micah Smoak',
  'Nick Demarchi','John Beauregard','Derek Beauregard','Ryan Beauregard',
  'Nick Brabant','Court Russo'
];

async function loadPairings() {
  const token = localStorage.getItem('ff_token');
  setPairStatus('Loading...', 'saving');
  try {
    if (token) {
      const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${PAIRINGS_FILE}`, {
        headers: { 'Authorization': `token ${token}`, 'Cache-Control': 'no-cache' }
      });
      if (res.ok) {
        const json = await res.json();
        pairingsSha = json.sha;
        pairingsData = JSON.parse(atob(json.content.replace(/\s/g,'')));
        setPairStatus('✓ Pairings loaded', 'ok');
        renderPairings();
        return;
      }
    }
    // Fallback: raw URL
    const raw = await fetch(`https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/main/${PAIRINGS_FILE}?_=${Date.now()}`);
    if (raw.ok) {
      pairingsData = await raw.json();
      pairingsSha = null;
      setPairStatus('✓ Pairings loaded', 'ok');
    } else {
      pairingsData = { rounds: [
        { round:1, course:'True Blue', date:'Friday, July 11', groups:[] },
        { round:2, course:'Caledonia', date:'Friday, July 11', groups:[] },
        { round:3, course:'Pawleys Plantation', date:'Saturday, July 12', groups:[] },
        { round:4, course:'TPC Myrtle Beach', date:'Sunday, July 13', groups:[] }
      ]};
      setPairStatus('Using blank pairings', 'err');
    }
    renderPairings();
  } catch(e) {
    setPairStatus('Could not load pairings: ' + e.message, 'err');
  }
}

function switchRound(idx) {
  activeRound = idx;
  document.querySelectorAll('.round-tab').forEach((t,i) => t.classList.toggle('active', i === idx));
  renderPairings();
}

function renderPairings() {
  if (!pairingsData) return;
  const round = pairingsData.rounds[activeRound];
  const assigned = round.groups.flatMap(g => g.players);
  const unassigned = ALL_PLAYERS.filter(p => !assigned.includes(p));

  let html = `<div class="groups-grid">`;
  round.groups.forEach((g, gi) => {
    html += `
      <div class="group-card">
        <div class="group-card-header">Group ${gi + 1}</div>
        <input class="group-tee-input" placeholder="Tee Time (e.g. 8:06 AM)"
          value="${g.teeTime || ''}"
          oninput="pairingsData.rounds[${activeRound}].groups[${gi}].teeTime = this.value"/>
        <div class="group-players" id="group-players-${gi}">
          ${g.players.map(p => `
            <div class="group-player-row">
              <span>${p}</span>
              <button class="remove-player" onclick="removeFromGroup(${gi},'${p}')">×</button>
            </div>`).join('')}
        </div>
        ${unassigned.length > 0 ? `
        <select onchange="addToGroup(${gi}, this)" style="margin-top:8px;width:100%;background:rgba(255,255,255,0.08);border:1px solid rgba(201,168,76,0.3);color:var(--cream);padding:6px;font-family:'Oswald',sans-serif;font-size:12px;">
          <option value="">+ Add player</option>
          ${unassigned.map(p => `<option value="${p}">${p}</option>`).join('')}
        </select>` : ''}
      </div>`;
  });
  html += `</div>`;

  if (round.groups.length < 5) {
    html += `<button class="add-group-btn" onclick="addGroup()">+ Add Group</button>`;
  }

  if (unassigned.length > 0) {
    html += `<div style="margin-top:16px;">
      <div class="player-pool-label">Unassigned Players</div>
      <div class="player-pool">${unassigned.map(p =>
        `<span class="pool-player" onclick="promptAddToGroup('${p}')">${p}</span>`
      ).join('')}</div>
    </div>`;
  }

  document.getElementById('pairings-builder').innerHTML = html;
}

function addGroup() {
  pairingsData.rounds[activeRound].groups.push({ teeTime: '', players: [] });
  renderPairings();
}

function addToGroup(gi, sel) {
  const player = sel.value;
  if (!player) return;
  pairingsData.rounds[activeRound].groups[gi].players.push(player);
  renderPairings();
}

function promptAddToGroup(player) {
  const round = pairingsData.rounds[activeRound];
  if (round.groups.length === 0) { alert('Add a group first.'); return; }
  if (round.groups.length === 1) { addToGroupByName(0, player); return; }
  const choice = prompt(`Add ${player} to which group?\n${round.groups.map((g,i) => `${i+1}: ${g.teeTime||'Group '+(i+1)}`).join('\n')}\nEnter group number:`);
  const idx = parseInt(choice) - 1;
  if (!isNaN(idx) && idx >= 0 && idx < round.groups.length) addToGroupByName(idx, player);
}

function addToGroupByName(gi, player) {
  pairingsData.rounds[activeRound].groups[gi].players.push(player);
  renderPairings();
}

function removeFromGroup(gi, player) {
  const g = pairingsData.rounds[activeRound].groups[gi];
  g.players = g.players.filter(p => p !== player);
  renderPairings();
}

async function savePairings() {
  const token = localStorage.getItem('ff_token');
  if (!token) { setPairStatus('No token saved', 'err'); return; }
  setPairStatus('Saving...', 'saving');
  try {
    if (!pairingsSha) {
      const shaRes = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${PAIRINGS_FILE}`, {
        headers: { 'Authorization': `token ${token}` }
      });
      if (shaRes.ok) { const j = await shaRes.json(); pairingsSha = j.sha; }
    }
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(pairingsData, null, 2))));
    const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${PAIRINGS_FILE}`, {
      method: 'PUT',
      headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify(Object.assign({ message: 'Update pairings', content }, pairingsSha ? { sha: pairingsSha } : {}))
    });
    if (res.ok) {
      const j = await res.json(); pairingsSha = j.content.sha;
      setPairStatus('✓ Pairings saved! Site will update in ~30 seconds', 'ok');
    } else {
      const err = await res.json();
      setPairStatus(`✗ Save failed (${res.status}): ${err.message}`, 'err');
    }
  } catch(e) { setPairStatus('✗ Error: ' + e.message, 'err'); }
}

function setPairStatus(msg, cls) {
  const el = document.getElementById('pairings-status');
  el.textContent = msg; el.className = cls;
}
</script>
</body>
</html>
